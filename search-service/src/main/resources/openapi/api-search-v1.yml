openapi: 3.0.3
info:
  title: RouteCraft Search Service API
  description: Semantic route search API backed by OpenAI embeddings and Qdrant.
  version: 1.0.0

servers:
  - url: /api
    description: API Gateway

tags:
  - name: search
    description: Semantic search endpoints.

paths:
  /search:
    get:
      tags: [search]
      summary: Search published routes by semantic query.
      description: Creates an embedding for the query and searches indexed published routes in Qdrant. Available only for admins.
      operationId: searchRoutes
      parameters:
        - name: q
          in: query
          description: Search query.
          required: true
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          description: Number of results.
          schema:
            type: integer
            default: 12
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: Found route cards.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchRouteResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'

components:
  responses:
    BadRequestError:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchErrorResponse'
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchErrorResponse'

  schemas:
    SearchRouteResponse:
      type: object
      description: Route preview card returned from the vector index.
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        distance:
          type: number
          format: double
          minimum: 0
        durationMinutes:
          type: integer
          minimum: 0
        authorName:
          type: string
        status:
          type: string
          enum: [PUBLISHED]
        is_liked:
          type: boolean
          default: false
        score:
          type: number
          format: float

    SearchErrorResponse:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

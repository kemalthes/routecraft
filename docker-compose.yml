services:

  postgres:
    image: postgres:16-alpine
    container_name: core-postgres
    env_file:
      .env
    environment:
      POSTGRES_DB: routecraft_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routecraft -d routecraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: core-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--requirepass", "redis"
    ]

volumes:
  postgres_data:
  redis_data:

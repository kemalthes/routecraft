spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:15432/routecraft_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: redis

minio:
  endpoint: http://localhost:9000
  accessKey: minio
  secretKey: minio
  bucket: routes
  webhook-token: "Ваш_Секретный_Токен"
  presignedUrlTtl: 10

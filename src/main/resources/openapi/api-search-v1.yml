openapi: 3.0.3
info:
  title: RouteCraft Search Service API
  description: Сервис семантического векторного поиска маршрутов (интеграция со Spring AI и Qdrant)
  version: 1.0.0

servers:
  - url: /api/search
    description: Search Service

tags:
  - name: search
    description: Эндпоинты для полнотекстового и семантического поиска

paths:
  /:
    get:
      tags: [search]
      summary: Поиск маршрутов по смысловому запросу
      description: Использует Spring AI для векторизации запроса и поиска ближайших соседей в Qdrant.
      operationId: searchRoutes
      parameters:
        - name: q
          in: query
          description: Текстовый запрос пользователя
          required: true
          schema:
            type: string
            minLength: 2
        - name: limit
          in: query
          description: Количество результатов
          schema:
            type: integer
            default: 3
            maximum: 10
      responses:
        '200':
          description: Список найденных маршрутов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchRouteResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'

components:
  responses:
    BadRequestError:
      description: Неверные параметры запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchErrorResponse'

  schemas:
    SearchRouteResponse:
      type: object
      description: Денормализованная карточка маршрута из Qdrant Payload
      properties:
        routeId:
          type: integer
          format: int64
          example: 125
        title:
          type: string
          example: "Тропа по горам Кавказа"
        description:
          type: string
          example: "Увлекательный маршрут для любителей активного отдыха..."
        imageUrl:
          type: string
          example: "/api/files/preview/mountains.jpg"
        score:
          type: number
          format: float
          description: Релевантность поиска (cosine similarity)
          example: 0.985

    SearchErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        message:
          type: string
          example: "Поисковый запрос слишком короткий"
        details:
          type: string
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:15432/routecraft_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        show_sql: true

  data:
    redis:
      host: localhost
      port: 16379
      password: redis

minio:
  endpoint: http://localhost:9000
  accessKey: minio
  secretKey: minioadmin
  bucket: routes
  webhook-token: "secret_key"
  presignedUrlTtl: 10

allowed-origins: http://localhost:5173/

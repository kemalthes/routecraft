spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

minio:
  endpoint: ${MINIO_ENDPOINT}
  accessKey: ${MINIO_USERNAME}
  secretKey: ${MINIO_PASSWORD}
  bucket: ${MINIO_BUCKET}
  webhook-token: ${MINIO_WH_TOKEN}
  presignedUrlTtl: 10

allowed-origins: ${ALLOWED_ORIGINS}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
  mail:
    enabled: ${AUTH_MAIL_ENABLED:true}
    from: ${AUTH_MAIL_FROM}

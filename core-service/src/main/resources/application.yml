spring:
  application:
    name: core-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: db/changelog-master.yml
    enabled: true

server:
  port: 8081

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:dev-only-change-this-secret-to-at-least-32-characters}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:30d}
  verification:
    code-ttl: ${AUTH_CODE_TTL:10m}
  mail:
    from: ${AUTH_MAIL_FROM:noreply@routecraft.local}

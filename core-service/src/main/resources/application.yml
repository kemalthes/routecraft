server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: core-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/routecraft_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:16379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redis}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          connectionTimeout: 5000
          timeout: 5000
          writeTimeout: 5000
          ssl:
            enable: true
          starttls:
            enable: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: db/changelog-master.yml
    enabled: true

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:dev-only-change-this-secret-to-at-least-32-characters}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:30d}
  verification:
    code-ttl: ${AUTH_CODE_TTL:10m}
  mail:
    from: ${AUTH_MAIL_FROM:noreply@routecraft.local}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
  access-key: ${MINIO_ACCESS_KEY:minio}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:routes}
  webhook-token: ${MINIO_WEBHOOK_TOKEN:secret_key}
  presigned-url-ttl: ${MINIO_PRESIGNED_URL_TTL:10}

osrm:
  base-url: ${OSRM_BASE_URL:https://router.project-osrm.org}

allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost,http://localhost:*,http://127.0.0.1,http://127.0.0.1:*}
